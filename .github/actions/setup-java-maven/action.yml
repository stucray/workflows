# Reads the project's Java version from `<java.version>` in pom.xml, then
# installs that JDK (Temurin distribution) with Maven dependency caching.
# Used by the SB+Maven CI and release workflows so a project's declared
# Java version is the single source of truth.

name: Set up Java + Maven
description: Installs the JDK declared in pom.xml's <java.version>, with Maven dependency caching.

outputs:
  java-version:
    description: The Java version that was installed (read from pom.xml).
    value: ${{ steps.read-version.outputs.version }}

runs:
  using: composite
  steps:
    - name: Read Java version from pom.xml
      id: read-version
      shell: bash
      run: |
        set -euo pipefail
        v=$(grep -m1 '<java.version>' pom.xml | sed 's/.*>\(.*\)<.*/\1/')
        [ -n "$v" ] || { echo "::error::Could not find <java.version> property in pom.xml"; exit 1; }
        echo "version=$v" >> "$GITHUB_OUTPUT"

    - name: Set up Temurin JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ steps.read-version.outputs.version }}
        cache: maven
